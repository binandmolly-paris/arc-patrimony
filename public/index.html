<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Arc Patrimony - 云端版本">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Arc Patrimony">
    <meta name="theme-color" content="#0f172a">
    <title>Arc Patrimony</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
        }

        #root {
            height: 100%;
        }

        /* Login Screen */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 100%);
            padding: 20px;
        }

        .login-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .login-logo {
            font-size: 48px;
            text-align: center;
            margin-bottom: 20px;
        }

        .login-title {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
            color: #6366f1;
        }

        .login-subtitle {
            font-size: 14px;
            text-align: center;
            color: #94a3b8;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #cbd5e1;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .form-error {
            color: #f87171;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .form-error.show {
            display: block;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: #6366f1;
            color: white;
        }

        .btn-primary:hover {
            background-color: #4f46e5;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background-color: #334155;
            color: #e2e8f0;
        }

        .btn-secondary:hover {
            background-color: #475569;
        }

        .btn-secondary:active {
            transform: scale(0.98);
        }

        /* App Layout */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #0f172a;
        }

        .app-header {
            background-color: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .app-title {
            font-size: 20px;
            font-weight: bold;
            color: #6366f1;
        }

        .header-user {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
        }

        .header-user-badge {
            background-color: #334155;
            padding: 6px 12px;
            border-radius: 20px;
            color: #cbd5e1;
        }

        .btn-logout {
            padding: 8px 16px;
            background-color: #64748b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: background-color 0.2s;
        }

        .btn-logout:hover {
            background-color: #475569;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #334155;
            background-color: #1e293b;
            overflow-x: auto;
            padding: 0 20px;
        }

        .tab {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            color: #94a3b8;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tab:hover {
            color: #cbd5e1;
        }

        .tab.active {
            color: #6366f1;
            border-bottom-color: #6366f1;
        }

        .tab-badge {
            display: inline-block;
            background-color: #f87171;
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 6px;
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .hidden {
            display: none;
        }

        /* Dashboard */
        .stat-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 20px;
        }

        .stat-label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #6366f1;
        }

        .stat-change {
            font-size: 13px;
            color: #4ade80;
            margin-top: 5px;
        }

        .stat-change.negative {
            color: #f87171;
        }

        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 20px;
        }

        .chart-title {
            font-size: 14px;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 15px;
        }

        canvas {
            max-width: 100%;
            height: auto;
        }

        .holdings-table {
            width: 100%;
            border-collapse: collapse;
            background-color: #1e293b;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #334155;
        }

        .holdings-table thead {
            background-color: #0f172a;
            border-bottom: 1px solid #334155;
        }

        .holdings-table th {
            padding: 12px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .holdings-table td {
            padding: 12px 16px;
            font-size: 13px;
            border-bottom: 1px solid #334155;
        }

        .holdings-table tbody tr:last-child td {
            border-bottom: none;
        }

        .holdings-table tbody tr:hover {
            background-color: #0f172a;
        }

        .symbol-cell {
            font-weight: 600;
            color: #6366f1;
        }

        .region-badge {
            display: inline-block;
            background-color: #334155;
            color: #cbd5e1;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
        }

        .price-positive {
            color: #4ade80;
        }

        .price-negative {
            color: #f87171;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .empty-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #cbd5e1;
        }

        .empty-text {
            font-size: 13px;
            color: #94a3b8;
        }

        /* Search and Stock Cards */
        .search-box {
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
        }

        .search-input:focus {
            outline: none;
            border-color: #6366f1;
        }

        .stock-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .stock-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .stock-card:hover {
            border-color: #6366f1;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        .stock-card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .stock-card-symbol {
            font-weight: 600;
            color: #6366f1;
            font-size: 16px;
        }

        .stock-card-change {
            font-size: 14px;
            font-weight: 600;
        }

        .stock-card-name {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .stock-card-price {
            font-size: 18px;
            font-weight: bold;
            color: #e2e8f0;
            margin-bottom: 8px;
        }

        .stock-detail-panel {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .stock-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 20px;
        }

        .stock-detail-info h2 {
            font-size: 20px;
            color: #e2e8f0;
            margin-bottom: 5px;
        }

        .stock-detail-info p {
            font-size: 13px;
            color: #94a3b8;
        }

        .stock-detail-price {
            text-align: right;
        }

        .stock-detail-price-value {
            font-size: 24px;
            font-weight: bold;
            color: #6366f1;
        }

        .stock-detail-chart canvas {
            width: 100%;
            height: 200px;
        }

        /* Trade Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 18px;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 20px;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 24px;
            cursor: pointer;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-grid.full {
            grid-template-columns: 1fr;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
        }

        /* Alert Cards */
        .alert-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .alert-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 15px;
        }

        .alert-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .alert-card-symbol {
            font-weight: 600;
            color: #6366f1;
            font-size: 14px;
        }

        .alert-card-close {
            background: none;
            border: none;
            color: #f87171;
            cursor: pointer;
            font-size: 18px;
            padding: 0;
        }

        .alert-card-condition {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        .alert-card-price {
            font-size: 16px;
            font-weight: bold;
            color: #6366f1;
            margin-bottom: 12px;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            background-color: #334155;
            border-radius: 13px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .toggle-switch.active {
            background-color: #4ade80;
        }

        .toggle-slider {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background-color: white;
            border-radius: 50%;
            transition: left 0.2s;
        }

        .toggle-switch.active .toggle-slider {
            left: 27px;
        }

        /* Trade Table */
        .trades-table {
            width: 100%;
            border-collapse: collapse;
            background-color: #1e293b;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #334155;
        }

        .trades-table thead {
            background-color: #0f172a;
            border-bottom: 1px solid #334155;
        }

        .trades-table th {
            padding: 12px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .trades-table td {
            padding: 12px 16px;
            font-size: 13px;
            border-bottom: 1px solid #334155;
        }

        .trades-table tbody tr:last-child td {
            border-bottom: none;
        }

        .trades-table tbody tr:hover {
            background-color: #0f172a;
        }

        .trade-type-buy {
            color: #4ade80;
        }

        .trade-type-sell {
            color: #f87171;
        }

        /* FX Rates */
        .fx-rates {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .fx-rate {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .fx-rate-label {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 5px;
        }

        .fx-rate-value {
            font-size: 16px;
            font-weight: bold;
            color: #6366f1;
        }

        /* Data Management */
        .data-management {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .data-section {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 20px;
        }

        .data-section-title {
            font-size: 14px;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 15px;
        }

        .user-info {
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.8;
        }

        .user-info strong {
            color: #cbd5e1;
        }

        .data-buttons {
            display: flex;
            gap: 10px;
        }

        #importFile {
            display: none;
        }

        .loading {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #334155;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .tabs {
                padding: 0 10px;
            }

            .tab {
                padding: 10px 12px;
                font-size: 12px;
            }

            .tab-content {
                padding: 15px;
            }

            .stat-cards {
                grid-template-columns: 1fr;
            }

            .charts-row {
                grid-template-columns: 1fr;
            }

            .stock-cards {
                grid-template-columns: 1fr;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .data-buttons {
                flex-direction: column;
            }

            .modal-content {
                padding: 20px;
            }

            .holdings-table,
            .trades-table {
                font-size: 12px;
            }

            .holdings-table th,
            .holdings-table td,
            .trades-table th,
            .trades-table td {
                padding: 8px 10px;
            }
        }

        /* Utility */
        .mt-20 {
            margin-top: 20px;
        }

        .text-center {
            text-align: center;
        }

        .text-sm {
            font-size: 12px;
        }

        .text-muted {
            color: #94a3b8;
        }

        .nowrap {
            white-space: nowrap;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script>
    // ============ State Management ============
    const APP = {
        token: localStorage.getItem('kxm_token'),
        username: localStorage.getItem('kxm_user'),
        prices: {},
        priceUpdateInterval: null,
        holdings: [],
        trades: [],
        alerts: [],
        selectedStock: null,
        isRegister: false,
        regionFilter: '全部',
        currencyFilter: '全部',
        holdingsSort: { key: null, dir: 'desc' },
        portfolioBudget: 0,
        FX_RATES: {
            'JPY': 0.0067,
            'CNY': 0.138,
            'USD': 1,
            'HKD': 0.128,
            'default': 1
        }
    };

    const API_BASE = '/api';

    // ============ Utility Functions ============
    async function apiCall(endpoint, method = 'GET', body = null, isAuthorized = true) {
        const options = {
            method,
            headers: {
                'Content-Type': 'application/json'
            }
        };

        if (isAuthorized && APP.token) {
            options.headers['x-token'] = APP.token;
        }

        if (body) {
            options.body = JSON.stringify(body);
        }

        try {
            const response = await fetch(`${API_BASE}${endpoint}`, options);
            if (!response.ok) {
                throw new Error(`API error: ${response.status}`);
            }
            return await response.json();
        } catch (error) {
            console.error('API call failed:', error);
            throw error;
        }
    }

    function fmtNum(value, decimals = 2) {
        return Number(value).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
    }

    function formatCurrency(value, currency = 'USD') {
        const rate = APP.FX_RATES[currency] || APP.FX_RATES.default;
        const converted = value * rate;
        const symbol = currency === 'USD' ? '$' : currency === 'CNY' ? '¥' : currency;
        return `${symbol}${fmtNum(converted)}`;
    }

    function formatPercent(value) {
        const sign = value >= 0 ? '+' : '';
        return `${sign}${value.toFixed(2)}%`;
    }

    function getRegionColor(region) {
        const colors = {
            'US': '#6366f1',
            'HK': '#4ade80',
            'JP': '#f87171',
            'CN': '#fbbf24'
        };
        return colors[region] || '#64748b';
    }

    // ============ Canvas Chart Functions ============
    function drawPie(canvasId, data) {
        const canvas = document.getElementById(canvasId);
        if (!canvas || !data || data.length === 0) return;
        try { _drawPieInner(canvas, data); } catch(e) { console.warn('drawPie error:', e.message); }
    }
    function _drawPieInner(canvas, data) {

        const ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = Math.max(Math.min(centerX, centerY) - 20, 30);
        const innerRadius = radius * 0.6;

        let currentAngle = -Math.PI / 2;
        const total = data.reduce((sum, d) => sum + d.value, 0);

        data.forEach(item => {
            const sliceAngle = (item.value / total) * 2 * Math.PI;

            // Draw slice
            ctx.fillStyle = item.color;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, currentAngle, currentAngle + sliceAngle);
            ctx.lineTo(centerX + innerRadius * Math.cos(currentAngle + sliceAngle / 2),
                       centerY + innerRadius * Math.sin(currentAngle + sliceAngle / 2));
            ctx.arc(centerX, centerY, innerRadius, currentAngle + sliceAngle, currentAngle, true);
            ctx.closePath();
            ctx.fill();

            currentAngle += sliceAngle;
        });

        // Draw center text
        ctx.fillStyle = '#e2e8f0';
        ctx.font = 'bold 16px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(`$${Number(total.toFixed(0)).toLocaleString('en-US')}`, centerX, centerY);
    }

    function drawLine(canvasId, data, color = '#6366f1') {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;

        const ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;

        const padding = 40;
        const width = canvas.width - padding * 2;
        const height = canvas.height - padding * 2;

        const values = data.map(d => d.v);
        const minVal = Math.min(...values);
        const maxVal = Math.max(...values);
        const range = maxVal - minVal || 1;

        // Draw gradient
        const gradient = ctx.createLinearGradient(0, padding, 0, padding + height);
        gradient.addColorStop(0, color + '40');
        gradient.addColorStop(1, color + '00');

        // Draw line
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();

        data.forEach((point, i) => {
            const x = padding + (i / (data.length - 1)) * width;
            const y = padding + height - ((point.v - minVal) / range) * height;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        });

        ctx.stroke();

        // Fill area under curve
        ctx.lineTo(padding + width, padding + height);
        ctx.lineTo(padding, padding + height);
        ctx.closePath();
        ctx.fillStyle = gradient;
        ctx.fill();

        // Draw grid lines
        ctx.strokeStyle = '#334155';
        ctx.lineWidth = 1;
        for (let i = 0; i <= 4; i++) {
            const y = padding + (height / 4) * i;
            ctx.beginPath();
            ctx.moveTo(padding, y);
            ctx.lineTo(padding + width, y);
            ctx.stroke();
        }

        // Draw axes
        ctx.strokeStyle = '#475569';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(padding, padding);
        ctx.lineTo(padding, padding + height);
        ctx.lineTo(padding + width, padding + height);
        ctx.stroke();
    }

    function drawBar(canvasId, data) {
        const canvas = document.getElementById(canvasId);
        if (!canvas || !data || data.length === 0) return;
        try {

        const ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;

        const padding = 40;
        const width = canvas.width - padding * 2;
        const height = canvas.height - padding * 2;

        const values = data.map(d => d.value);
        const minVal = Math.min(...values, 0);
        const maxVal = Math.max(...values);
        const range = maxVal - minVal || 1;

        const barWidth = width / data.length * 0.6;
        const barGap = width / data.length;

        data.forEach((item, i) => {
            const x = padding + (i + 0.2) * barGap;
            const barHeight = (item.value - minVal) / range * height;
            const y = padding + height - barHeight;

            ctx.fillStyle = item.value >= 0 ? '#4ade80' : '#f87171';
            ctx.fillRect(x, Math.min(y, padding + height), barWidth, Math.abs(barHeight));

            // Label
            ctx.fillStyle = '#cbd5e1';
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(item.label, x + barWidth / 2, padding + height + 20);
        });

        // Axes
        ctx.strokeStyle = '#475569';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(padding, padding);
        ctx.lineTo(padding, padding + height);
        ctx.lineTo(padding + width, padding + height);
        ctx.stroke();

        // Zero line
        const zeroY = padding + height - ((0 - minVal) / range) * height;
        ctx.strokeStyle = '#334155';
        ctx.beginPath();
        ctx.moveTo(padding, zeroY);
        ctx.lineTo(padding + width, zeroY);
        ctx.stroke();
        } catch(e) { console.warn('drawBar error:', e.message); }
    }

    function drawHBar(canvasId, data) {
        const canvas = document.getElementById(canvasId);
        if (!canvas || !data || data.length === 0) return;
        try {

        const ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;

        const padding = 100;
        const width = canvas.width - padding - 20;
        const height = canvas.height - padding;
        const barHeight = Math.max(20, height / data.length);

        const values = data.map(d => d.value);
        const maxVal = Math.max(...values);

        data.forEach((item, i) => {
            const y = padding + i * barHeight;
            const barWidth = (item.value / maxVal) * width;

            ctx.fillStyle = item.color || '#6366f1';
            ctx.fillRect(padding, y, barWidth, barHeight - 5);

            // Label
            ctx.fillStyle = '#cbd5e1';
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText(item.label, padding - 10, y + barHeight / 2);

            // Value
            ctx.fillStyle = '#94a3b8';
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(item.value.toFixed(2), padding + barWidth + 5, y + barHeight / 2);
        });
        } catch(e) { console.warn('drawHBar error:', e.message); }
    }

    async function handleLogin() {
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        const errorEl = document.getElementById('loginError');

        if (!username || !password) {
            errorEl.textContent = '请输入用户名和密码';
            errorEl.classList.add('show');
            return;
        }

        try {
            const endpoint = APP.isRegister ? '/register' : '/login';
            const data = await apiCall(endpoint, 'POST', { username, password }, false);

            APP.token = data.token;
            APP.username = data.username;
            localStorage.setItem('kxm_token', data.token);
            localStorage.setItem('kxm_user', data.username);

            showApp();
        } catch (error) {
            errorEl.textContent = APP.isRegister ? '注册失败，用户名可能已存在' : '登录失败，用户名或密码错误';
            errorEl.classList.add('show');
        }
    }

    function handleLogout() {
        localStorage.removeItem('kxm_token');
        localStorage.removeItem('kxm_user');
        APP.token = null;
        APP.username = null;
        APP.isRegister = false;
        if (APP.priceUpdateInterval) clearInterval(APP.priceUpdateInterval);
        showLogin();

    function renderTab4() {
        const container = document.getElementById('tab-4');
        if (APP.holdings.length === 0) {
            container.innerHTML = `<div class="empty-state"><div class="empty-icon">📈</div><div class="empty-title">无数据可分析</div></div>`;
            return;
        }

        const st = APP.analysisState;
        const regions = ['全部', ...new Set(APP.holdings.map(h => h.region).filter(Boolean))];
        const currencies = ['全部', ...new Set(APP.holdings.map(h => h.currency).filter(Boolean))];

        // Build enriched data
        let data = APP.holdings.map(h => {
            const currentPrice = APP.prices[h.symbol]?.price || h.avg_cost;
            const priceChange = APP.prices[h.symbol]?.change || 0;
            const rate = APP.FX_RATES[h.currency] || 1;
            const marketValueLocal = h.qty * currentPrice;
            const costLocal = h.qty * h.avg_cost;
            const plLocal = marketValueLocal - costLocal;
            const marketValueUSD = marketValueLocal * rate;
            const costUSD = costLocal * rate;
            const plUSD = marketValueUSD - costUSD;
            const plPct = costUSD > 0 ? (plUSD / costUSD * 100) : 0;
            return { ...h, currentPrice, priceChange, marketValueLocal, costLocal, plLocal, marketValueUSD, costUSD, plUSD, plPct };
        });

        // Apply filters
        if (st.regionFilter !== '全部') data = data.filter(d => d.region === st.regionFilter);

    function copyAnalysisTable() {
        const table = document.getElementById('analysisTable');
        if (!table) return;
        let tsv = '';
        const rows = table.querySelectorAll('tr');
        rows.forEach(row => {
            const cells = row.querySelectorAll('th, td');
            const vals = [];
            cells.forEach(c => vals.push(c.innerText.replace(/\t/g, ' ').replace(/\n/g, ' ')));
            tsv += vals.join('\t') + '\n';
        });
        navigator.clipboard.writeText(tsv).then(() => {
            alert('表格已复制到剪贴板！可直接粘贴到 Excel');
        }).catch(() => {
            // Fallback
            const ta = document.createElement('textarea');
            ta.value = tsv; document.body.appendChild(ta);
            ta.select(); document.execCommand('copy');
            document.body.removeChild(ta);
            alert('表格已复制到剪贴板！');
        });
    }

    function renderTab5Portfolio() {
        const container = document.getElementById('tab-5');
        const regions = [...new Set(APP.holdings.map(h => h.region).filter(Boolean))];

        let html = `<div class="chart-card" style="margin-bottom:16px;">
            <div class="chart-title">投资组合设计</div>

            </div>
        </div>`;

        regions.forEach(region => {
            const regionHoldings = APP.holdings.filter(h => h.region === region);
            const currencySymbol = regionHoldings[0]?.currency === 'CNY' ? '¥' : regionHoldings[0]?.currency === 'JPY' ? '¥' : regionHoldings[0]?.currency === 'HKD' ? 'HK$' : '$';
            const cur = regionHoldings[0]?.currency || 'USD';
            const fxRate = APP.FX_RATES[cur] || 1;
            const budget = parseFloat(APP.portfolioBudget) || 0;

            let regionTotalWeight = 0;
            let regionTargetUSD = 0;
            let regionCurrentUSD = 0;

            html += `<div class="chart-card" style="margin-bottom:16px;">
                <div class="chart-title" style="margin-bottom:12px;">🏴 ${region} 组合 (${cur})</div>
                <table class="holdings-table" style="font-size:13px;">
                    <thead><tr>
                        <th>代码</th><th>名称</th><th>币种</th>
                        <th>目标权重</th><th>目标金额(${cur})</th>
                        <th>当前市值(${cur})</th><th>已达成%</th>
                        <th>还须购入(${cur})</th><th>折合USD</th>
                    </tr></thead><tbody>`;

            regionHoldings.forEach(h => {
                const tw = h.target_weight || 0;
                const targetUSD = budget * tw / 100;
                const targetLocal = targetUSD / fxRate;
                const currentPrice = APP.prices[h.symbol]?.price || h.avg_cost;
                const currentLocal = h.qty * currentPrice;
                const currentUSD = currentLocal * fxRate;
                const completion = targetLocal > 0 ? (currentLocal / targetLocal * 100) : 0;
                const toBuyLocal = Math.max(0, targetLocal - currentLocal);
                const toBuyUSD = toBuyLocal * fxRate;

                regionTotalWeight += tw;
                regionTargetUSD += targetUSD;
                regionCurrentUSD += currentUSD;

                html += `<tr>
                    <td class="symbol-cell">${h.symbol}</td>
                    <td>${h.name}</td>
                    <td>${h.currency}</td>
                    <td><input type="number" value="${tw}" min="0" max="100" step="0.5" style="width:60px;background:#0f172a;border:1px solid #334155;color:#e2e8f0;border-radius:4px;padding:3px 6px;text-align:right;" onchange="saveTargetWeight('${h.symbol}',this.value)">%</td>
                    <td style="text-align:right;">${fmtNum(targetLocal, 0)}</td>
                    <td style="text-align:right;">${fmtNum(currentLocal, 0)}</td>
                    <td style="text-align:right;color:${completion>=100?'#4ade80':completion>=50?'#fbbf24':'#f87171'}">${fmtNum(completion,1)}%</td>
                    <td style="text-align:right;">${fmtNum(toBuyLocal, 0)}</td>
                    <td style="text-align:right;">$${fmtNum(toBuyUSD, 0)}</td>
                </tr>`;
            });

            const regionToBuyUSD = Math.max(0, regionTargetUSD - regionCurrentUSD);
            html += `</tbody><tfoot><tr style="border-top:2px solid #334155;font-weight:bold;">
                <td colspan="3">${region} 小计</td>
                <td style="text-align:right;">${fmtNum(regionTotalWeight,1)}%</td>
                <td></td><td></td><td></td><td></td>
                <td style="text-align:right;">$${fmtNum(regionToBuyUSD, 0)}</td>
            </tr></tfoot></table></div>`;
        });

        container.innerHTML = html;
    }

    async function autoFillTrade() {
        let sym = document.getElementById('tradeSymbol').value.trim();
        if (!sym) return;
        sym = sym.toUpperCase();
        document.getElementById('tradeSymbol').value = sym;

        // Look up from existing holdings
        const match = APP.holdings.find(h => h.symbol.toUpperCase() === sym);
        if (match) {
            document.getElementById('tradeName').value = match.name;
            document.getElementById('tradeCurrency').value = match.currency;
            document.getElementById('tradeRegion').value = match.region;
            if (match.attribute) document.getElementById('tradeAttribute').value = match.attribute;
            if (match.sector) document.getElementById('tradeSector').value = match.sector;
            const pd = APP.prices[match.symbol];
            const price = pd && pd.price ? pd.price : match.avg_cost;
            document.getElementById('tradePrice').value = price.toFixed(2);
            return;
        }

        // Not in holdings — call server lookup API
        try {
            const nameEl = document.getElementById('tradeName');
            nameEl.value = '查询中...';
            const data = await fetch(`${API_BASE}/stock-lookup?symbol=${encodeURIComponent(sym)}`).then(r => r.json());
            if (data.found) {
                nameEl.value = data.name;
                document.getElementById('tradeCurrency').value = data.currency;
                document.getElementById('tradeRegion').value = data.region;
                if (data.price > 0) document.getElementById('tradePrice').value = data.price.toFixed(2);
                // Correct the symbol if Yahoo returns a different one
                if (data.symbol && data.symbol !== sym) {
                    document.getElementById('tradeSymbol').value = data.symbol;
                }
            } else {
                nameEl.value = '';
                // Fallback: detect from suffix
                if (sym.endsWith('.HK')) {
                    document.getElementById('tradeCurrency').value = 'HKD';
                    document.getElementById('tradeRegion').value = '中国';
                } else if (sym.endsWith('.T')) {
                    document.getElementById('tradeCurrency').value = 'JPY';
                    document.getElementById('tradeRegion').value = '日本';
                } else if (sym.endsWith('.SS') || sym.endsWith('.SZ')) {
                    document.getElementById('tradeCurrency').value = 'CNY';
                    document.getElementById('tradeRegion').value = '中国';
                } else {
                    document.getElementById('tradeCurrency').value = 'USD';
                    document.getElementById('tradeRegion').value = '美国';
                }
            }
        } catch(e) {
            console.warn('Stock lookup failed:', e.message);
            document.getElementById('tradeName').value = '';
        }
    }

    async function submitTrade() {
        const symbol = document.getElementById('tradeSymbol').value;
        const name = document.getElementById('tradeName').value;
        const type = document.getElementById('tradeType').value;
        const qty = parseFloat(document.getElementById('tradeQty').value);

        const region = document.getElementById('tradeRegion').value;
        const attribute = document.getElementById('tradeAttribute').value;
        const sector = document.getElementById('tradeSector').value;

        if (!symbol || !name || !qty || !price || !date) {
            alert('请填写所有必填字段');
            return;
        }

        try {
            await apiCall('/trade', 'POST', {
                symbol, name, type, qty, price, fee, date, currency, market, region, attribute, sector
            });

            await loadHoldings();
            await loadTrades();
            await updatePrices();

            closeModal('tradeModal');

            // Re-render all visible tabs

            renderTab2();

            document.getElementById('tradePrice').value = '';
            document.getElementById('tradeFee').value = '';
            document.getElementById('tradeAttribute').value = '';
            document.getElementById('tradeSector').value = '';

            document.getElementById('tradeDate').value = today;
        } catch (error) {
            alert('保存交易失败: ' + error.message);
        }
    }

    }

    async function deleteAlert(id) {
        if (!confirm('确定要删除这个提醒吗？')) return;

        try {
            await apiCall(`/alert/${id}`, 'DELETE');
            await loadAlerts();
            renderTab3();
        } catch (error) {
            alert('删除提醒失败: ' + error.message);
        }
    }

    function selectStock(stock) {
        APP.selectedStock = stock;
        renderTab1();
    }

    async function exportData() {
        try {
            const data = await apiCall('/export');
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `kxm-data-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        } catch (error) {
            alert('导出数据失败: ' + error.message);
        }
    }

    async function importData(event) {
        const file = event.target.files[0];
        if (!file) return;

        try {
            const json = await file.text();
            const data = JSON.parse(json);

            if (!data.holdings || !Array.isArray(data.holdings)) {
                alert('无效的数据格式');
                return;
            }

            await apiCall('/import-holdings', 'POST', { holdings: data.holdings });
            await loadHoldings();
            await updatePrices();
            renderTab0();

            alert('导入成功');
        } catch (error) {
            alert('导入失败: ' + error.message);
        }

        event.target.value = '';
    }

    // ============ Init ============
    window.addEventListener('load', async () => {
        if (APP.token) {
            showApp();
        } else {
            showLogin();
        }
    });
</script>
</body>
</html>
