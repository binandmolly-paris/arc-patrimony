<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Arc Patrimony - Cloud Version">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Arc Patrimony">
    <meta name="theme-color" content="#060b18">
    <title>Arc Patrimony</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C1A673;
            --gold-light: #EADDBC;
            --gold-dark: #96845E;
            --gold-glow: rgba(193,166,115,0.15);
            --gold-border: rgba(193,166,115,0.2);
            --gold-border-hover: rgba(193,166,115,0.4);
            --bg-deep: #0B0F12;
            --bg-card: rgba(20,25,32,0.6);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: 'Montserrat', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-deep);
            color: #e2e8f0;
        }

        #root {
            height: 100%;
        }

        /* ===== Sci-fi Grid Background ===== */
        .app-container::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(193,166,115,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(193,166,115,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }
        .app-container::after {
            content: '';
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(ellipse at 20% 20%, rgba(193,166,115,0.05) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, rgba(150,132,94,0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .app-container > * { position: relative; z-index: 1; }

        /* ===== Glassmorphism base ===== */
        .glass {
            background: var(--bg-card) !important;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--gold-border) !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.03);
        }

        /* ===== Breathing glow animation ===== */
        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 8px rgba(193,166,115,0.1), 0 4px 15px rgba(0,0,0,0.2); }
            50% { box-shadow: 0 0 20px rgba(193,166,115,0.2), 0 4px 20px rgba(0,0,0,0.3); }
        }
        @keyframes breatheActive {
            0%, 100% { box-shadow: 0 0 12px rgba(193,166,115,0.3), 0 4px 20px rgba(0,0,0,0.3); }
            50% { box-shadow: 0 0 28px rgba(234,221,188,0.4), 0 4px 25px rgba(0,0,0,0.4); }
        }

        /* ===== Brand loading screen ===== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes logoGlow {
            0%, 100% { filter: drop-shadow(0 0 8px rgba(193,166,115,0.2)); }
            50% { filter: drop-shadow(0 0 20px rgba(234,221,188,0.5)); }
        }
        @keyframes starPulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; filter: drop-shadow(0px 0px 8px rgba(234,221,188,0.8)); }
        }
        @keyframes slideIn {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }

        /* Login Screen */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-deep);
            background-image:
                linear-gradient(rgba(193,166,115,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(193,166,115,0.025) 1px, transparent 1px);
            background-size: 60px 60px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .login-screen::before {
            content: '';
            position: absolute;
            top: -30%; left: -30%; width: 160%; height: 160%;
            background: radial-gradient(ellipse at 30% 30%, rgba(193,166,115,0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 70%, rgba(150,132,94,0.04) 0%, transparent 50%);
            pointer-events: none;
        }

        .login-card {
            background: rgba(20, 25, 32, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--gold-border);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(234,221,188,0.03);
            position: relative;
            z-index: 1;
            animation: fadeIn 0.6s ease-out;
        }

        .login-logo {
            font-size: 48px;
            text-align: center;
            margin-bottom: 12px;
        }

        .login-brand-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            animation: logoGlow 3s ease-in-out infinite;
        }

        .login-title {
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 26px;
            font-weight: 500;
            text-align: center;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #C1A673, #EADDBC, #96845E);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 6px;
        }

        .login-subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            font-weight: 300;
            text-align: center;
            color: var(--gold-dark);
            margin-bottom: 30px;
            letter-spacing: 6px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #cbd5e1;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(11, 15, 18, 0.6);
            border: 1px solid rgba(150,132,94,0.25);
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(193,166,115,0.1), 0 0 15px rgba(193,166,115,0.08);
        }

        .form-error {
            color: #f87171;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .form-error.show {
            display: block;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #C1A673, #96845E);
            color: #0B0F12;
            border-radius: 10px;
            font-weight: 500;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #EADDBC, #C1A673);
            box-shadow: 0 4px 20px rgba(193,166,115,0.4);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: rgba(30, 35, 40, 0.5);
            border: 1px solid var(--gold-border);
            color: var(--gold-light);
            border-radius: 10px;
        }

        .btn-secondary:hover {
            background: rgba(40, 45, 50, 0.5);
            border-color: var(--gold-border-hover);
        }

        .btn-secondary:active {
            transform: scale(0.98);
        }

        /* App Layout */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #060b18;
            position: relative;
            overflow: hidden;
        }

        /* Market status light bar */
        .market-light-bar {
            height: 2px;
            background: linear-gradient(90deg, transparent, #4ade80, var(--gold), #4ade80, transparent);
            background-size: 200% 100%;
            animation: lightBarFlow 4s linear infinite;
        }
        .market-light-bar.negative {
            background: linear-gradient(90deg, transparent, #f87171, var(--gold), #f87171, transparent);
            background-size: 200% 100%;
        }
        @keyframes lightBarFlow {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }

        .app-header {
            background: rgba(11, 15, 18, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(193,166,115,0.1);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .app-title-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .app-logo-mini {
            width: 32px;
            height: 32px;
        }

        .app-title {
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 18px;
            font-weight: 500;
            background: linear-gradient(135deg, #C1A673, #EADDBC, #96845E);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
        }

        .header-user {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }

        .header-user-badge {
            background: rgba(193,166,115,0.1);
            border: 1px solid rgba(193,166,115,0.2);
            padding: 6px 14px;
            border-radius: 20px;
            color: var(--gold-light);
            font-weight: 400;
            font-size: 13px;
        }

        .btn-logout {
            padding: 7px 14px;
            background: rgba(248,113,113,0.08);
            border: 1px solid rgba(248,113,113,0.2);
            color: #fca5a5;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: rgba(248,113,113,0.15);
            border-color: rgba(248,113,113,0.35);
        }

        /* ===== Floating breathing tab buttons ===== */
        .tabs {
            display: flex;
            gap: 8px;
            background: rgba(11, 15, 18, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            overflow-x: auto;
            padding: 12px 20px;
            border-bottom: 1px solid rgba(193,166,115,0.06);
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border: 1px solid rgba(193,166,115,0.1);
            border-radius: 12px;
            color: #64748b;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.4s ease;
            background: rgba(20, 25, 32, 0.4);
            position: relative;
            animation: breathe 4s ease-in-out infinite;
        }

        .tab:hover {
            color: var(--gold-light);
            background: rgba(193,166,115,0.06);
            border-color: rgba(193,166,115,0.25);
        }

        .tab.active {
            color: var(--gold-light);
            background: linear-gradient(135deg, rgba(193,166,115,0.15), rgba(193,166,115,0.06));
            border-color: rgba(193,166,115,0.4);
            animation: breatheActive 3s ease-in-out infinite;
        }

        .tab-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #0B0F12;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 6px;
            font-weight: 600;
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .hidden {
            display: none;
        }

        /* Dashboard */
        .stat-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--gold-border);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .stat-card:hover {
            border-color: var(--gold-border-hover);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3), 0 0 15px var(--gold-glow);
        }

        .stat-label {
            font-size: 11px;
            color: var(--gold-dark);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--gold-light);
        }

        .stat-change {
            font-size: 13px;
            color: #4ade80;
            margin-top: 5px;
        }

        .stat-change.negative {
            color: #f87171;
        }

        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--gold-border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        .chart-card:hover {
            border-color: var(--gold-border-hover);
        }

        .chart-title {
            font-size: 14px;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 15px;
        }

        canvas {
            max-width: 100%;
            height: auto;
        }

        .holdings-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(15, 23, 42, 0.4);
            border: none;
        }

        .holdings-table thead {
            background: rgba(6, 11, 24, 0.8);
            border-bottom: 1px solid rgba(99,102,241,0.1);
        }

        .holdings-table th {
            padding: 12px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            position: sticky;
            top: 0;
            background: rgba(6, 11, 24, 0.95);
            z-index: 10;
        }

        .holdings-table td {
            padding: 12px 16px;
            font-size: 13px;
            border-bottom: 1px solid rgba(51, 65, 85, 0.3);
        }

        .holdings-table tbody tr:last-child td {
            border-bottom: none;
        }

        .holdings-table tbody tr:hover {
            background: rgba(193, 166, 115, 0.04);
        }

        .symbol-cell {
            font-weight: 600;
            color: var(--gold);
        }

        .region-badge {
            display: inline-block;
            background: rgba(193,166,115,0.08);
            border: 1px solid rgba(193,166,115,0.15);
            color: var(--gold-light);
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11px;
        }

        .price-positive {
            color: #4ade80;
        }

        .price-negative {
            color: #f87171;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .empty-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #cbd5e1;
        }

        .empty-text {
            font-size: 13px;
            color: #94a3b8;
        }

        /* Search and Stock Cards */
        .search-box {
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid var(--gold-border);
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--gold-border-hover);
            box-shadow: 0 0 15px var(--gold-glow);
        }

        .stock-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .stock-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(193,166,115,0.12);
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .stock-card:hover {
            border-color: var(--gold-border-hover);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3), 0 0 15px rgba(99, 102, 241, 0.15);
            transform: translateY(-2px);
        }

        .stock-card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .stock-card-symbol {
            font-weight: 600;
            color: var(--gold);
            font-size: 16px;
        }

        .stock-card-change {
            font-size: 14px;
            font-weight: 600;
        }

        .stock-card-name {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .stock-card-price {
            font-size: 18px;
            font-weight: bold;
            color: #e2e8f0;
            margin-bottom: 8px;
        }

        .stock-detail-panel {
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--gold-border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .stock-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 20px;
        }

        .stock-detail-info h2 {
            font-size: 20px;
            color: #e2e8f0;
            margin-bottom: 5px;
        }

        .stock-detail-info p {
            font-size: 13px;
            color: #94a3b8;
        }

        .stock-detail-price {
            text-align: right;
        }

        .stock-detail-price-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--gold-light);
        }

        .stock-detail-chart canvas {
            width: 100%;
            height: 200px;
        }

        /* Trade Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease-out;
        }

        .modal-header {
            font-size: 18px;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 20px;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 24px;
            cursor: pointer;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-grid.full {
            grid-template-columns: 1fr;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
        }

        /* Alert Cards */
        .alert-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .alert-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(193,166,115,0.12);
            border-radius: 12px;
            padding: 15px;
            transition: all 0.3s;
        }
        .alert-card:hover {
            border-color: var(--gold-border-hover);
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        }

        .alert-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .alert-card-symbol {
            font-weight: 600;
            color: var(--gold);
            font-size: 14px;
        }

        .alert-card-close {
            background: none;
            border: none;
            color: #f87171;
            cursor: pointer;
            font-size: 18px;
            padding: 0;
        }

        .alert-card-condition {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        .alert-card-price {
            font-size: 16px;
            font-weight: bold;
            color: var(--gold);
            margin-bottom: 12px;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            background-color: #334155;
            border-radius: 13px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .toggle-switch.active {
            background-color: #4ade80;
        }

        .toggle-slider {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background-color: white;
            border-radius: 50%;
            transition: left 0.2s;
        }

        .toggle-switch.active .toggle-slider {
            left: 27px;
        }

        /* Trade Table */
        .trades-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(15, 23, 42, 0.4);

<script>
    // ============ State Management ============
    const APP = {
        token: localStorage.getItem('kxm_token'),

        holdings: [],
        trades: [],
        alerts: [],

        isRegister: false,
        regionFilter: '全部',
        currencyFilter: '全部',
        holdingsSort: { key: null, dir: 'desc' },
        portfolioBudget: 0,
        regionBudgets: {},
        FX_RATES: {
            'JPY': 0.0067,
            'CNY': 0.138,
            'USD': 1,
            'HKD': 0.128,
            'default': 1
        }
    };

    const API_BASE = '/api';

    // ============ Utility Functions ============
    async function apiCall(endpoint, method = 'GET', body = null, isAuthorized = true) {
        const options = {
            method,
            headers: {
                'Content-Type': 'application/json'
            }
        };

        if (isAuthorized && APP.token) {
            options.headers['x-token'] = APP.token;
        }

        if (body) {
            options.body = JSON.stringify(body);
        }

        try {
            const response = await fetch(`${API_BASE}${endpoint}`, options);
            if (!response.ok) {
                throw new Error(`API error: ${response.status}`);
            }
            return await response.json();
        } catch (error) {
            console.error('API call failed:', error);
            throw error;
        }
    }

    function fmtNum(value, decimals = 2) {
        return Number(value).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
    }

    function formatCurrency(value, currency = 'USD') {
        const rate = APP.FX_RATES[currency] || APP.FX_RATES.default;
        const converted = value * rate;
        const symbol = currency === 'USD' ? '$' : currency === 'CNY' ? '¥' : currency;
        return `${symbol}${fmtNum(converted)}`;
    }

    function formatPercent(value) {
        const sign = value >= 0 ? '+' : '';
        return `${sign}${value.toFixed(2)}%`;
    }

    function getRegionColor(region) {
        const colors = {
            'US': '#C1A673',
            'HK': '#4ade80',
            'JP': '#f87171',
            'CN': '#fbbf24'
        };
        return colors[region] || '#64748b';
    }

    // ============ Canvas Chart Functions ============
    function drawPie(canvasId, data) {
        const canvas = document.getElementById(canvasId);
        if (!canvas || !data || data.length === 0) return;
        try { _drawPieInner(canvas, data); } catch(e) { console.warn('drawPie error:', e.message); }
    }
    function _drawPieInner(canvas, data) {

        const ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = Math.max(Math.min(centerX, centerY) - 20, 30);
        const innerRadius = radius * 0.6;

        let currentAngle = -Math.PI / 2;
        const total = data.reduce((sum, d) => sum + d.value, 0);

        data.forEach(item => {
            const sliceAngle = (item.value / total) * 2 * Math.PI;

            // Draw slice
            ctx.fillStyle = item.color;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, currentAngle, currentAngle + sliceAngle);
            ctx.lineTo(centerX + innerRadius * Math.cos(currentAngle + sliceAngle / 2),
                       centerY + innerRadius * Math.sin(currentAngle + sliceAngle / 2));
            ctx.arc(centerX, centerY, innerRadius, currentAngle + sliceAngle, currentAngle, true);
            ctx.closePath();
            ctx.fill();

            currentAngle += sliceAngle;
        });

        // Draw center text
        ctx.fillStyle = '#e2e8f0';
        ctx.font = 'bold 16px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(`$${Number(total.toFixed(0)).toLocaleString('en-US')}`, centerX, centerY);
    }

    function drawLine(canvasId, data, color = '#C1A673') {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;

        const ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;

        const padding = 40;
        const width = canvas.width - padding * 2;
        const height = canvas.height - padding * 2;

        const values = data.map(d => d.v);
        const minVal = Math.min(...values);
        const maxVal = Math.max(...values);
        const range = maxVal - minVal || 1;

        // Draw gradient
        const gradient = ctx.createLinearGradient(0, padding, 0, padding + height);
        gradient.addColorStop(0, color + '40');
        gradient.addColorStop(1, color + '00');

        // Draw line
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();

        data.forEach((point, i) => {
            const x = padding + (i / (data.length - 1)) * width;
            const y = padding + height - ((point.v - minVal) / range) * height;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        });

        ctx.stroke();

        // Fill area under curve
        ctx.lineTo(padding + width, padding + height);
        ctx.lineTo(padding, padding + height);
        ctx.closePath();
        ctx.fillStyle = gradient;
        ctx.fill();

        // Draw grid lines
        ctx.strokeStyle = '#334155';
        ctx.lineWidth = 1;
        for (let i = 0; i <= 4; i++) {
            const y = padding + (height / 4) * i;
            ctx.beginPath();
            ctx.moveTo(padding, y);
            ctx.lineTo(padding + width, y);
            ctx.stroke();
        }

        // Draw axes
        ctx.strokeStyle = '#475569';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(padding, padding);
        ctx.lineTo(padding, padding + height);
        ctx.lineTo(padding + width, padding + height);
        ctx.stroke();
    }

    function drawBar(canvasId, data) {
        const canvas = document.getElementById(canvasId);
        if (!canvas || !data || data.length === 0) return;
        try {

        const ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;

        const padding = 40;
        const width = canvas.width - padding * 2;
        const height = canvas.height - padding * 2;

        const values = data.map(d => d.value);
        const minVal = Math.min(...values, 0);
        const maxVal = Math.max(...values);
        const range = maxVal - minVal || 1;

        const barWidth = width / data.length * 0.6;
        const barGap = width / data.length;

        data.forEach((item, i) => {
            const x = padding + (i + 0.2) * barGap;
            const barHeight = (item.value - minVal) / range * height;
            const y = padding + height - barHeight;

            ctx.fillStyle = item.value >= 0 ? '#4ade80' : '#f87171';
            ctx.fillRect(x, Math.min(y, padding + height), barWidth, Math.abs(barHeight));

            // Label
            ctx.fillStyle = '#cbd5e1';
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(item.label, x + barWidth / 2, padding + height + 20);
        });

        // Axes
        ctx.strokeStyle = '#475569';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(padding, padding);
        ctx.lineTo(padding, padding + height);
        ctx.lineTo(padding + width, padding + height);
        ctx.stroke();

        // Zero line
        const zeroY = padding + height - ((0 - minVal) / range) * height;
        ctx.strokeStyle = '#334155';
        ctx.beginPath();
        ctx.moveTo(padding, zeroY);
        ctx.lineTo(padding + width, zeroY);
        ctx.stroke();
        } catch(e) { console.warn('drawBar error:', e.message); }
    }

    function drawHBar(canvasId, data) {
        const canvas = document.getElementById(canvasId);
        if (!canvas || !data || data.length === 0) return;
        try {

        const ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;

        const padding = 100;
        const width = canvas.width - padding - 20;
        const height = canvas.height - padding;
        const barHeight = Math.max(20, height / data.length);

        const values = data.map(d => d.value);
        const maxVal = Math.max(...values);

        data.forEach((item, i) => {
            const y = padding + i * barHeight;
            const barWidth = (item.value / maxVal) * width;

            ctx.fillStyle = item.color || '#C1A673';
            ctx.fillRect(padding, y, barWidth, barHeight - 5);

            // Label
            ctx.fillStyle = '#cbd5e1';
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText(item.label, padding - 10, y + barHeight / 2);

            // Value
            ctx.fillStyle = '#94a3b8';
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(item.value.toFixed(2), padding + barWidth + 5, y + barHeight / 2);
        });
        } catch(e) { console.warn('drawHBar error:', e.message); }
    }

    // ============ Auth Functions ============
    async function handleLogin() {
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        const errorEl = document.getElementById('loginError');

        if (!username || !password) {
            errorEl.textContent = 'Please enter username and password';
            errorEl.classList.add('show');
            return;
        }

        try {
            const endpoint = APP.isRegister ? '/register' : '/login';
            const data = await apiCall(endpoint, 'POST', { username, password }, false);

            APP.token = data.token;
            APP.username = data.username;
            localStorage.setItem('kxm_token', data.token);
            localStorage.setItem('kxm_user', data.username);

            showApp();
        } catch (error) {
            errorEl.textContent = APP.isRegister ? 'Registration failed, username may already exist' : 'Sign in failed, invalid username or password';
            errorEl.classList.add('show');
        }
    }

    function handleLogout() {
        localStorage.removeItem('kxm_token');
        localStorage.removeItem('kxm_user');
        APP.token = null;
        APP.username = null;
        APP.isRegister = false;
        if (APP.priceUpdateInterval) clearInterval(APP.priceUpdateInterval);
        showLogin();
    }

    function toggleRegister() {
        APP.isRegister = !APP.isRegister;
        const btn = document.getElementById('toggleRegisterBtn');
        const title = document.querySelector('.login-title');
        const subtitle = document.querySelector('.login-subtitle');
        const loginBtn = document.querySelector('button[data-action="login"]');

        if (APP.isRegister) {
            title.textContent = 'Create Account';
            subtitle.textContent = 'Create Your Account';
            loginBtn.textContent = 'Sign Up';
            btn.textContent = 'Have account? Sign In';
        } else {
            title.textContent = 'Arc Patrimony';
            subtitle.textContent = 'Value Beyond Generations';
            loginBtn.textContent = 'Sign In';
            btn.textContent = 'Create Account';
        }

        document.getElementById('loginError').classList.remove('show');
    }

        const symbols = APP.holdings.map(h => h.symbol).join(',');
        try {
            const data = await apiCall(`/prices?symbols=${symbols}`);
            APP.prices = data;

            console.error('Failed to update prices:', error);

    async function initializeApp() {
        await updateFXRates();
        await loadHoldings();
        await loadTrades();
        await loadAlerts();
        // Seed target alerts only for LiuBin on first use
        if (APP.alerts.length === 0 && APP.username === 'LiuBin') {
            await seedTargetAlerts();
            await loadAlerts();
        }
        await updatePrices();
        try {
            const config = await apiCall('/portfolio-config');
            APP.portfolioBudget = config.totalBudget || 0;
            // Load per-region budgets
            APP.regionBudgets = {};
            Object.keys(config).forEach(k => {
                if (k.startsWith('budget_')) APP.regionBudgets[k.replace('budget_','')] = parseFloat(config[k]) || 0;
            });
        } catch(e) {}

        // Update prices every 30 seconds
        if (APP.priceUpdateInterval) clearInterval(APP.priceUpdateInterval);
        APP.priceUpdateInterval = setInterval(async () => {
            await updatePrices();
            // Re-render current active tab with latest prices
            const activeIdx = document.querySelector('.tab.active');
            if (activeIdx) {
                const tabs = document.querySelectorAll('.tab');
                const idx = Array.from(tabs).indexOf(activeIdx);
                if (idx === 0) renderTab0();
                else if (idx === 1) renderTab1();
                else if (idx === 4) renderTab4();
            }
        }, 30000);

        // Update FX rates every 10 minutes
        if (APP._fxInterval) clearInterval(APP._fxInterval);
        APP._fxInterval = setInterval(async () => {
            await updateFXRates();
            renderTab0();
        }, 10 * 60 * 1000);
    }

    function renderTab4() {
        const container = document.getElementById('tab-4');
        if (APP.holdings.length === 0) {
            container.innerHTML = `<div class="empty-state"><div class="empty-icon">📈</div><div class="empty-title">No data to analyze</div></div>`;
            return;
        }

        const st = APP.analysisState;
        const regions = ['全部', ...new Set(APP.holdings.map(h => h.region).filter(Boolean))];
        const currencies = ['全部', ...new Set(APP.holdings.map(h => h.currency).filter(Boolean))];

        // Build enriched data
        let allData = APP.holdings.map(h => {
            const currentPrice = APP.prices[h.symbol]?.price || h.avg_cost;
            const priceChange = APP.prices[h.symbol]?.change || 0;
            const rate = APP.FX_RATES[h.currency] || 1;
            const isSold = h.qty <= 0;
            const marketValueLocal = isSold ? 0 : h.qty * currentPrice;
            const costLocal = isSold ? 0 : h.qty * h.avg_cost;
            const plLocal = isSold ? (h.realized_pl || 0) : marketValueLocal - costLocal;
            const marketValueUSD = isSold ? 0 : marketValueLocal * rate;
            const costUSD = isSold ? 0 : costLocal * rate;
            const plUSD = isSold ? (h.realized_pl || 0) * rate : marketValueUSD - costUSD;
            const plPct = isSold ? (h.realized_cost > 0 ? (h.realized_pl / h.realized_cost * 100) : 0) : (costUSD > 0 ? (plUSD / costUSD * 100) : 0);
            return { ...h, currentPrice, priceChange, marketValueLocal, costLocal, plLocal, marketValueUSD, costUSD, plUSD, plPct, isSold };
        });
        let data = allData.filter(d => !d.isSold);
        let soldData = allData.filter(d => d.isSold);

        // Apply filters
        if (st.regionFilter !== '全部') { data = data.filter(d => d.region === st.regionFilter); soldData = soldData.filter(d => d.region === st.regionFilter); }
        if (st.currencyFilter !== '全部') { data = data.filter(d => d.currency === st.currencyFilter); soldData = soldData.filter(d => d.currency === st.currencyFilter); }

        // Sort
        const dir = st.sortDir === 'asc' ? 1 : -1;
        data.sort((a, b) => {
            let va = a[st.sortKey], vb = b[st.sortKey];
            if (typeof va === 'string') return va.localeCompare(vb) * dir;
            return ((va || 0) - (vb || 0)) * dir;
        });

        // Totals
        const totalMV = data.reduce((s, d) => s + d.marketValueUSD, 0);
        const totalCost = data.reduce((s, d) => s + d.costUSD, 0);

        const isLocalCur = st.currencyFilter !== '全部';

                    <th ${thClick('plPct')}>P&L%${sortIcon('plPct')}</th>

        data.forEach(d => {

                </tr>

        } else {
            html += `</tbody><tfoot><tr style="border-top:2px solid #334155;font-weight:bold;">
                <td colspan="6">Total (${data.length} stocks)</td>

        html += `</table></div>

    function copyAnalysisTable() {
        const table = document.getElementById('analysisTable');
        if (!table) return;
        let tsv = '';
        const rows = table.querySelectorAll('tr');
        rows.forEach(row => {
            const cells = row.querySelectorAll('th, td');
            const vals = [];
            cells.forEach(c => vals.push(c.innerText.replace(/\t/g, ' ').replace(/\n/g, ' ')));
            tsv += vals.join('\t') + '\n';
        });
        navigator.clipboard.writeText(tsv).then(() => {
            alert('Table copied to clipboard! You can paste it directly into Excel');
        }).catch(() => {
            // Fallback
            const ta = document.createElement('textarea');
            ta.value = tsv; document.body.appendChild(ta);
            ta.select(); document.execCommand('copy');
            document.body.removeChild(ta);

    // ===== 股票详情弹窗 =====
    function showStockDetail(symbol) {
        const holding = APP.holdings.find(h => h.symbol === symbol);
        if (!holding) return;
        const trades = APP.trades.filter(t => t.symbol === symbol).sort((a, b) => new Date(a.date) - new Date(b.date));
        if (trades.length === 0) { alert('No trades found for this stock'); return; }

        const rate = APP.FX_RATES[holding.currency] || 1;
        const curSym = holding.currency==='CNY'?'¥':holding.currency==='JPY'?'¥':holding.currency==='HKD'?'HK$':'$';
        const isSold = holding.qty <= 0;
        const currentPrice = APP.prices[symbol]?.price || holding.avg_cost;

        // Calculate running position
        let runQty = 0, totalBuyCost = 0, totalBuyQty = 0;
        let totalSellRevenue = 0, totalSellQty = 0, totalDividend = 0;
        const timeline = trades.map(t => {
            const isBuy = t.type === '买入' || t.type === 'BUY';
            const isDividend = t.type === '分红' || t.type === 'DIVIDEND';
            if (isBuy) {
                runQty += t.qty;
                totalBuyCost += t.qty * t.price;
                totalBuyQty += t.qty;
            } else if (isDividend) {
                totalDividend += t.qty * t.price;
            } else {
                runQty -= t.qty;
                totalSellRevenue += t.qty * t.price;
                totalSellQty += t.qty;
            }
            return { ...t, runQty: Math.max(0, runQty) };
        });

        const avgBuyCost = totalBuyQty > 0 ? totalBuyCost / totalBuyQty : 0;
        const currentMV = holding.qty * currentPrice;
        const unrealizedPL = isSold ? 0 : currentMV - (holding.qty * avgBuyCost);
        const realizedPL = totalSellQty > 0 ? totalSellRevenue - (totalSellQty * avgBuyCost) : 0;
        const totalPL = unrealizedPL + realizedPL + totalDividend;
        const totalInvested = totalBuyCost;
        const totalReturn = totalInvested > 0 ? (totalPL / totalInvested * 100) : 0;

        let html = `
        <div class="modal show" id="stockDetailModal" onclick="if(event.target===this)this.classList.remove('show')" style="z-index:1001;">
            <div class="modal-content" style="max-width:700px;position:relative;">
                <button class="modal-close" onclick="document.getElementById('stockDetailModal').classList.remove('show')">×</button>
                <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">
                    <div>
                        <h2 style="color:#C1A673;margin-bottom:4px;">${holding.symbol}</h2>
                        <div style="color:#cbd5e1;font-size:16px;">${holding.name}</div>
                        <div style="color:#94a3b8;font-size:13px;margin-top:4px;">${holding.region} · ${holding.currency} · ${holding.attribute||''}</div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-size:13px;color:#94a3b8;">${isSold ? '已清仓' : '当前持有 '+fmtNum(holding.qty,0)+' 股'}</div>
                        ${!isSold ? `<div style="font-size:20px;font-weight:bold;color:#e2e8f0;">${curSym}${fmtNum(currentPrice)}</div>` : ''}
                    </div>
                </div>

                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px;">
                    <div style="background:#0f172a;border-radius:8px;padding:12px;">
                        <div style="font-size:11px;color:#94a3b8;">总投入</div>
                        <div style="font-size:16px;font-weight:bold;color:#e2e8f0;">${curSym}${fmtNum(totalBuyCost)}</div>
                    </div>
                    <div style="background:#0f172a;border-radius:8px;padding:12px;">
                        <div style="font-size:11px;color:#94a3b8;">已实现盈亏</div>
                        <div style="font-size:16px;font-weight:bold;" class="${realizedPL>=0?'price-positive':'price-negative'}">${realizedPL>=0?'+':''}${curSym}${fmtNum(realizedPL)}</div>
                    </div>
                    <div style="background:#0f172a;border-radius:8px;padding:12px;">
                        <div style="font-size:11px;color:#94a3b8;">未实现盈亏</div>
                        <div style="font-size:16px;font-weight:bold;" class="${unrealizedPL>=0?'price-positive':'price-negative'}">${isSold?'-':(unrealizedPL>=0?'+':'')+curSym+fmtNum(unrealizedPL)}</div>
                    </div>
                    <div style="background:#0f172a;border-radius:8px;padding:12px;">
                        <div style="font-size:11px;color:#94a3b8;">分红收入</div>
                        <div style="font-size:16px;font-weight:bold;color:#fbbf24;">${totalDividend > 0 ? '+'+curSym+fmtNum(totalDividend) : '-'}</div>
                    </div>
                    <div style="background:#0f172a;border-radius:8px;padding:12px;">
                        <div style="font-size:11px;color:#94a3b8;">总收益</div>
                        <div style="font-size:16px;font-weight:bold;" class="${totalPL>=0?'price-positive':'price-negative'}">${totalPL>=0?'+':''}${curSym}${fmtNum(totalPL)}</div>
                    </div>
                    <div style="background:#0f172a;border-radius:8px;padding:12px;">
                        <div style="font-size:11px;color:#94a3b8;">总收益率</div>
                        <div style="font-size:16px;font-weight:bold;" class="${totalReturn>=0?'price-positive':'price-negative'}">${formatPercent(totalReturn)}</div>
                    </div>
                </div>

                <div style="font-size:14px;font-weight:600;color:#cbd5e1;margin-bottom:10px;">交易时间线</div>
                <div style="max-height:300px;overflow-y:auto;">
                <table class="trades-table" style="font-size:12px;">
                    <thead><tr>
                        <th>日期</th><th>类型</th><th>数量</th><th>单价</th><th>金额</th><th>持仓</th>
                    </tr></thead><tbody>
                    ${timeline.map(t => {
                        const isBuy = t.type === '买入' || t.type === 'BUY';
                        const isDiv = t.type === '分红' || t.type === 'DIVIDEND';
                        const cls = isDiv ? 'trade-type-dividend' : (isBuy ? 'trade-type-buy' : 'trade-type-sell');
                        const label = isDiv ? '分红' : (isBuy ? '买入' : '卖出');
                        const amount = t.qty * t.price;
                        return `<tr>
                            <td>${new Date(t.date).toLocaleDateString('zh-CN')}</td>
                            <td class="${cls}"><strong>${label}</strong></td>
                            <td style="text-align:right;">${fmtNum(t.qty, isDiv ? 0 : 2)}</td>
                            <td style="text-align:right;">${curSym}${fmtNum(t.price)}</td>
                            <td style="text-align:right;">${curSym}${fmtNum(amount)}</td>
                            <td style="text-align:right;">${fmtNum(t.runQty, 0)}</td>
                        </tr>`;
                    }).join('')}
                    </tbody>
                </table>
                </div>
            </div>
        </div>`;

        // Remove existing modal if any
        const old = document.getElementById('stockDetailModal');
        if (old) old.remove();
        document.body.insertAdjacentHTML('beforeend', html);
    }

            const regionGapLocal = regionTargetLocal - regionCurrentLocal;
            const regionGapUSD = regionGapLocal * fxRate;

                <td style="text-align:right;color:${regionGapLocal>0?'#fbbf24':'#4ade80'}">${regionGapLocal>0?'+':''}${fmtNum(regionGapLocal, 0)}</td>

            </tr></tfoot></table></div>`;
        });

        container.innerHTML = html;

    async function autoFillTrade() {
        let sym = document.getElementById('tradeSymbol').value.trim();
        if (!sym) return;
        sym = sym.toUpperCase();
        document.getElementById('tradeSymbol').value = sym;

        // Look up from existing holdings
        const match = APP.holdings.find(h => h.symbol.toUpperCase() === sym);
        if (match) {
            document.getElementById('tradeName').value = match.name;
            document.getElementById('tradeCurrency').value = match.currency;
            document.getElementById('tradeRegion').value = match.region;
            if (match.attribute) document.getElementById('tradeAttribute').value = match.attribute;
            if (match.sector) document.getElementById('tradeSector').value = match.sector;
            const pd = APP.prices[match.symbol];
            const price = pd && pd.price ? pd.price : match.avg_cost;
            document.getElementById('tradePrice').value = price.toFixed(2);
            return;
        }

        // Not in holdings — call server lookup API
        try {
            const nameEl = document.getElementById('tradeName');
            nameEl.value = '查询中...';
            const data = await fetch(`${API_BASE}/stock-lookup?symbol=${encodeURIComponent(sym)}`).then(r => r.json());
            if (data.found) {
                nameEl.value = data.name;
                document.getElementById('tradeCurrency').value = data.currency;
                document.getElementById('tradeRegion').value = data.region;
                if (data.price > 0) document.getElementById('tradePrice').value = data.price.toFixed(2);
                // Correct the symbol if Yahoo returns a different one
                if (data.symbol && data.symbol !== sym) {
                    document.getElementById('tradeSymbol').value = data.symbol;
                }
            } else {
                nameEl.value = '';
                // Fallback: detect from suffix
                if (sym.endsWith('.HK')) {
                    document.getElementById('tradeCurrency').value = 'HKD';
                    document.getElementById('tradeRegion').value = '中国';
                } else if (sym.endsWith('.T')) {
                    document.getElementById('tradeCurrency').value = 'JPY';
                    document.getElementById('tradeRegion').value = '日本';
                } else if (sym.endsWith('.SS') || sym.endsWith('.SZ')) {
                    document.getElementById('tradeCurrency').value = 'CNY';
                    document.getElementById('tradeRegion').value = '中国';
                } else {
                    document.getElementById('tradeCurrency').value = 'USD';
                    document.getElementById('tradeRegion').value = '美国';
                }
            }
        } catch(e) {
            console.warn('Stock lookup failed:', e.message);
            document.getElementById('tradeName').value = '';
        }
    }

    async function submitTrade() {
        const symbol = document.getElementById('tradeSymbol').value;
        const name = document.getElementById('tradeName').value;
        const type = document.getElementById('tradeType').value;
        const qty = parseFloat(document.getElementById('tradeQty').value);
        const price = parseFloat(document.getElementById('tradePrice').value);
        const fee = parseFloat(document.getElementById('tradeFee').value) || 0;
        const date = document.getElementById('tradeDate').value;
        const currency = document.getElementById('tradeCurrency').value;
        const market = document.getElementById('tradeMarket').value;
        const region = document.getElementById('tradeRegion').value;
        const attribute = document.getElementById('tradeAttribute').value;
        const sector = document.getElementById('tradeSector').value;

        if (!symbol || !name || !qty || !price || !date) {
            alert('Please fill all required fields');
            return;
        }

        try {
            await apiCall('/trade', 'POST', {
                symbol, name, type, qty, price, fee, date, currency, market, region, attribute, sector
            });

            // Reload all data in parallel then re-render
            await Promise.all([loadHoldings(), loadTrades(), updateFXRates()]);
            await updatePrices();

            closeModal('tradeModal');

            // Re-render ALL tabs to sync data
            renderTab0();
            renderTab1();
            renderTab2();
            renderTab4();
            if (typeof renderTab5Portfolio === 'function') {
                try { renderTab5Portfolio(); } catch(e) {}
            }

            // Reset form
            document.getElementById('tradeSymbol').value = '';
            document.getElementById('tradeName').value = '';
            document.getElementById('tradeQty').value = '';
            document.getElementById('tradePrice').value = '';
            document.getElementById('tradeFee').value = '';
            document.getElementById('tradeAttribute').value = '';
            document.getElementById('tradeSector').value = '';
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('tradeDate').value = today;
        } catch (error) {
            alert('Failed to save trade: ' + error.message);
        }
    }

            renderTab3();
        } catch (error) {
            alert('Failed to update alert: ' + error.message);
        }
    }

    async function deleteAlert(id) {
        if (!confirm('确定要删除这个提醒吗？')) return;

        try {
            await apiCall(`/alert/${id}`, 'DELETE');
            await loadAlerts();
            renderTab3();
        } catch (error) {
            alert('Failed to delete alert: ' + error.message);
        }
    }

    function selectStock(stock) {
        APP.selectedStock = stock;
        renderTab1();
    }

    async function exportData() {
        try {
            const data = await apiCall('/export');
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `kxm-data-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        } catch (error) {
            alert('Failed to export data: ' + error.message);
        }
    }

    async function importData(event) {
        const file = event.target.files[0];
        if (!file) return;

        try {
            const json = await file.text();
            const data = JSON.parse(json);

            if (!data.holdings || !Array.isArray(data.holdings)) {
                alert('Invalid data format');
                return;
            }

            await apiCall('/import-holdings', 'POST', { holdings: data.holdings });
            await loadHoldings();
            await updatePrices();
            renderTab0();

            alert('Import successful');
        } catch (error) {
            alert('Import failed: ' + error.message);
        }

        event.target.value = '';
    }

    // ============ Init ============
    window.addEventListener('load', async () => {
        if (APP.token) {
            // 验证token是否仍然有效（服务器重启后session会清空）
            try {
                const resp = await fetch(API_BASE + '/verify', {
                    headers: { 'x-token': APP.token }
                });
                const data = await resp.json();
                if (data.valid) {
                    showApp();
                } else {
                    // token无效，清除本地存储，显示登录页
                    localStorage.removeItem('kxm_token');
                    localStorage.removeItem('kxm_user');
                    APP.token = null;
                    APP.username = null;
                    showLogin();
                }
            } catch (e) {
                // 网络错误，显示登录页
                localStorage.removeItem('kxm_token');
                localStorage.removeItem('kxm_user');
                APP.token = null;
                APP.username = null;
                showLogin();
            }
        } else {
            showLogin();
        }
    });
</script>
</body>
</html>
